name: "Setup Rust, Node, Yarn, and Vite"
description: "Installs Rust toolchain, Node.js, enables Yarn via Corepack, and optionally installs dependencies (including Vite)"
inputs:
  rust-version:
    description: "Rust toolchain version (e.g., stable, nightly, 1.70.0)"
    required: false
    default: "stable"

  github_actor:
    description: "GitHub actor"
    required: false
    default: ${{ github.actor }}

  github_token:
    description: "GitHub token"
    required: false
    default: ${{ secrets.GITHUB_TOKEN }}

runs:
  using: "composite"
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ inputs.rust-version }}
    - name: Setup Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-all-crates: true

    # Dockerx
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.github_actor }}
        password: ${{ inputs.github_token }}
