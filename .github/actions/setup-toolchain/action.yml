name: "Setup Rust, Node, Yarn, and Vite"
description: "Installs Rust toolchain, Node.js, enables Yarn via Corepack, and optionally installs dependencies (including Vite)"
inputs:
  rust-version:
    description: "Rust toolchain version (e.g., stable, nightly, 1.70.0)"
    required: false
    default: "stable"
  node-version:
    description: "Node.js version (e.g., 18, 20, lts/*)"
    required: false
    default: "20"
  yarn-version:
    description: 'Yarn version (e.g., stable, classic, 3.6.0) – applied via "yarn set version"'
    required: false
    default: ""
  install-dependencies:
    description: 'Whether to run "yarn install" to install project dependencies (including Vite)'
    required: false
    default: "true"
  working-directory:
    description: "Directory containing package.json and yarn.lock (relative to repository root)"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    # Rust 工具链
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ inputs.rust-version }}

    # Dockerx
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

