name: "Setup Rust, Node, Yarn, and Vite"
description: "Installs Rust toolchain, Node.js, enables Yarn via Corepack, and optionally installs dependencies (including Vite)"
inputs:
  rust-version:
    description: "Rust toolchain version (e.g., stable, nightly, 1.70.0)"
    required: false
    default: "stable"

  github_actor:
    description: "GitHub actor"
    required: false
    default: ${{ github.actor }}

  github_token:
    description: "GitHub token"
    required: false
    default: ${{ secrets.GITHUB_TOKEN }}

  node-version: # 新增：Node.js 版本输入
    description: "Node.js version to use"
    required: false
    default: 24 # 默认使用 Node.js 20 LTS

  python-version:
    description: "Python version to use"
    required: false
    default: 3.12

runs:
  using: "composite"
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ inputs.rust-version }}
    - name: Setup Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-all-crates: true # 已设置，缓存 registry 源码
        cache-on-failure: true # 即使构建失败也保存缓存（调试时有用）
        sharedKey: my-workspace-cache # 可选：跨分支共享基础依赖（谨慎使用）
        workspaces: |
          . -> target

    # ---------- 新增 Yarn 相关步骤 ----------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack (for Yarn)
      run: corepack enable
      shell: bash

    - name: Setup uv
      uses: astral-sh/setup-uv@v3

    - name: Setup Python by uv
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    # ---------- 新增 Yarn 相关步骤 ----------

    # Dockerx
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.github_actor }}
        password: ${{ inputs.github_token }}
