name: "Build Rust Application"
description: "Build Rust Application for release or debug"
inputs:
  release:
    description: "Build in release mode (default: false)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    # build it
    - name: Build
      shell: bash
      run: |
        if [ "${{ inputs.release }}" = "true" ]; then
          export cargo_mode="--release"
        else
          export cargo_mode=""
        fi
        cargo build $cargo_mode -p dashboard
        cargo build $cargo_mode -p gateway
        cargo build $cargo_mode -p webgateway-mnt

    - name: Copy only build artifacts
      shell: bash
      run: |
        mkdir builds
        cp -r "target/$cargo_mode/dashboard" builds/dashboard
        cp -r "target/$cargo_mode/gateway" builds/gateway
        cp -r "target/$cargo_mode/webgateway-mnt" builds/webgateway-mnt

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: builds/*
        # if: ${{ github.event.inputs.release }}
