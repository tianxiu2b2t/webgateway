name: "Download Maxmind GeoIP2"
description: "Download Maxmind GeoIP2 database"

runs:
  using: "composite"
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v3

    - name: Setup Python by uv
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Download Maxmind GeoIP2
      shell: bash
      run: |
        cd ipdb
        uv sync
        uv run main.py
