name: "Setup Environment"
description: "Setup Environment for release or debug"
inputs:
  release:
    description: "Build in release mode (default: false)"
    required: false
    default: "false"

  github_actor:
    description: "GitHub actor"
    required: false
    default: ${{ github.actor }}

  github_token:
    description: "GitHub token"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Environment Setup
      shell: bash
      run: |
        echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
        echo "BUILD_MODE=${{ input.release }}" >> $GITHUB_ENV

    - name: Setup docker
      uses: ./.github/actions/setup-docker
      with:
        github_actor: ${{ inputs.github_actor }}
        github_token: ${{ inputs.github_token }}
