name: "Setup Environment"
description: "Setup Environment for release or debug"
inputs:
  release:
    description: "Build in release mode (default: false)"
    required: false
    default: "false"
  rust-version:
    description: "Rust toolchain version (e.g., stable, nightly, 1.70.0)"
    required: false
    default: "stable"

  github_actor:
    description: "GitHub actor"
    required: false
    default: ${{ github.actor }}

  github_token:
    description: "GitHub token"
    required: false
    default: ""

  node-version: # 新增：Node.js 版本输入
    description: "Node.js version to use"
    required: false
    default: 24 # 默认使用 Node.js 20 LTS

  python-version: # 新增：Python 版本输入
    description: "Python version to use"
    required: false
    default: 3.12 # 默认使用 Python 3.11

runs:
  using: "composite"
  steps:
    - name: Environment Setup
      shell: bash
      run: |
        echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

    - name: Download Maxmind GeoIP2
      shell: bash
      run: |
        cd ipdb
        uv install --force
        uv run main.py
        cd ..
        mkdir assets/ipdb
        cp -r ipdb/data/* ./assets/ipdb/

    - name: Setup toolchains
      uses: ./.github/actions/setup-toolchain
      with:
        rust-version: ${{ inputs.rust-version }}
        node-version: ${{ inputs.node-version }}
        github_actor: ${{ inputs.github_actor }}
        github_token: ${{ inputs.github_token }}
        python-version: ${{ inputs.python-version }}
