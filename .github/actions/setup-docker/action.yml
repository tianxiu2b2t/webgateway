name: "Setup Rust, Node, Yarn, and Vite"
description: "Installs Rust toolchain, Node.js, enables Yarn via Corepack, and optionally installs dependencies (including Vite)"
inputs:
  rust-version:
    description: "Rust toolchain version (e.g., stable, nightly, 1.70.0)"
    required: false
    default: "stable"

  github_actor:
    description: "GitHub actor"
    required: false
    default: ${{ github.actor }}

  github_token:
    description: "GitHub token"
    required: false
    default: ${{ secrets.GITHUB_TOKEN }}

  node-version: # 新增：Node.js 版本输入
    description: "Node.js version to use"
    required: false
    default: 24 # 默认使用 Node.js 20 LTS

  python-version:
    description: "Python version to use"
    required: false
    default: 3.12

runs:
  using: "composite"
  steps:
    # Dockerx
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.github_actor }}
        password: ${{ inputs.github_token }}
