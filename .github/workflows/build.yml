name: Build release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchain # 根据实际路径调整
        with:
          rust-version: "stable"
          install-dependencies: "true" # 默认 true

      # 后续步骤可以直接使用安装好的工具
      - name: Build gateway with Rust
        run: cargo build --release -p gateway

      - name: Build dashboard with Rust
        run: cargo build --release -p dashboard

      - name: Build dashboard mnt with Rust
        run: cargo build --release -p webgateway-mnt
