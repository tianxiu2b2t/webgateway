name: Build release
on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Environment Setup
        shell: bash
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          rust-version: "stable"
          install-dependencies: "true"
          github_actor: "tianxiu2b2t"
          github_token: ${{ secrets.GH_TOKEN }}

      - name: Build release
        uses: ./.github/actions/build
        with:
          release: true

      - name: Prepare release
        shell: bash
        run: |
          cp ./builds/gateway ./gateway/gateway

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/webgateway-gateway:latest
            ghcr.io/${{ github.repository }}/webgateway-gateway:${{ github.sha }}
            ghcr.io/${{ github.repository }}/webgateway-gateway:${{ env.RELEASE_VERSION }}
