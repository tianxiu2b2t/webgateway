name: Build release
on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Environment Setup
        shell: bash
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          rust-version: "stable"
          node_version: 20
          github_actor: "tianxiu2b2t"
          github_token: ${{ secrets.GH_TOKEN }}

      - name: Build Frontend
        uses: ./.github/actions/build-frontend

      - name: Prepare Frontend
        shell: bash
        run: |
          mkdir ./dashboard/frontend/run/dist

          cp -r ./dashboard/frontend/dist/* ./dashboard/frontend/run/dist/

      - name: Build release
        uses: ./.github/actions/build
        with:
          release: true

      - name: Prepare release
        shell: bash
        run: |
          cp ./builds/gateway ./gateway/gateway
          cp ./builds/dashboard ./dashboard/backend/dashboard
          cp ./builds/webgateway-mnt ./dashboard/backend/webgateway-mnt

      - name: Build gateway and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gateway:latest
            ghcr.io/${{ github.repository }}/gateway:${{ github.sha }}
            ghcr.io/${{ github.repository }}/gateway:${{ env.RELEASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend dashboard and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dashboard-backend:latest
            ghcr.io/${{ github.repository }}/dashboard-backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/dashboard-backend:${{ env.RELEASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend dashboard and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard/frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dashboard-frontend:latest
            ghcr.io/${{ github.repository }}/dashboard-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/dashboard-frontend:${{ env.RELEASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
