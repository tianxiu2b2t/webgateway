networks:
  webgateway:
    name: webgateway
    driver: bridge
    ipam:
      driver: default
      config:
        - gateway: ${SUBNET_PREFIX:?SUBNET_PREFIX required}.1
          subnet: ${SUBNET_PREFIX}.0/24
    driver_opts:
      com.docker.network.bridge.name: webgateway

services:
  postgres:
    container_name: webgateway-pg
    restart: unless-stopped
    image: ${IMAGE_PREFIX:-ghcr.io/tianxiu2b2t}/postgres:${POSTGRES_TAG:-latest}
    volumes:
      - ${DATA_DIR:-./data}/pg:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command:
      - postgres
      - -c
      - max_connections=${PG_MAX_CONN:-100}
    healthcheck:
      test: "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-postgres}"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 80s
    networks:
      webgateway:
        ipv4_address: ${SUBNET_PREFIX}.2
  gateway:
    container_name: webgateway-gateway
    restart: unless-stopped
    image: ${IMAGE_PREFIX:-ghcr.io/tianxiu2b2t}/${IMAGE_PROJECT:-webgateway}/gateway:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_ENCODE_USER:-${POSTGRES_USER:-root}}:${POSTGRES_ENCODE_PASSWORD:-${POSTGRES_PASSWORD}}@webgateway-pg:5432/postgres}
    networks:
      webgateway:
        ipv4_address: ${SUBNET_PREFIX}.3
    ports:
      - 443:443
      - 80:80
    depends_on:
      - postgres
  dashboard-backend:
    container_name: webgateway-dashboard-backend
    restart: unless-stopped
    image: ${IMAGE_PREFIX:-ghcr.io/tianxiu2b2t}/${IMAGE_PROJECT:-webgateway}/dashboard-backend:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ:-Asia/Shanghai}
          DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_ENCODE_USER:-${POSTGRES_USER:-root}}:${POSTGRES_ENCODE_PASSWORD:-${POSTGRES_PASSWORD}}@webgateway-pg:5432/postgres}
    networks:
      webgateway:
        ipv4_address: ${SUBNET_PREFIX}.4
    depends_on:
      - postgres
  dashboard-frontend:
    container_name: webgateway-dashboard-frontend
    restart: unless-stopped
    image: ${IMAGE_PREFIX:-ghcr.io/tianxiu2b2t}/${IMAGE_PROJECT:-webgateway}/dashboard-frontend:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    networks:
      webgateway:
        ipv4_address: ${SUBNET_PREFIX}.5
    ports:
      - 4173:7173
    depends_on:
      - dashboard-backend
